<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dawn Panel</title>
  <style>
    /* ── 科技赛博主题 CSS 变量（双模式） ── */
    :root, [data-theme="dark"] {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-tertiary: #1e293b;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #1e293b;
      --border-glow: rgba(0, 255, 224, 0.15);
      --accent: #00ffe0;
      --accent-dim: rgba(0, 255, 224, 0.08);
      --accent-glow: 0 0 12px rgba(0, 255, 224, 0.15);
      --sidebar-bg: #0f172a;
      --input-bg: #0a0e17;
      --hover-bg: rgba(0, 255, 224, 0.06);
      --danger: #ff4d60;
      --success: #00e676;
      --warning: #ffc107;
      --blue: #165dff;
      --purple: #7c3aed;
      --glass-bg: rgba(17, 24, 39, 0.7);
      --scrollbar-thumb: #1e293b;
      --scrollbar-track: transparent;
    }
    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-tertiary: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #cbd5e1;
      --border-glow: rgba(0, 200, 180, 0.12);
      --accent: #00b3a0;
      --accent-dim: rgba(0, 180, 160, 0.06);
      --accent-glow: 0 0 8px rgba(0, 180, 160, 0.1);
      --sidebar-bg: #f8fafc;
      --input-bg: #ffffff;
      --hover-bg: rgba(0, 180, 160, 0.04);
      --danger: #e74c5e;
      --success: #10b981;
      --warning: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --glass-bg: rgba(248, 250, 252, 0.85);
      --scrollbar-thumb: #cbd5e1;
      --scrollbar-track: transparent;
    }

    /* ── Reset & Base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── App Layout ── */
    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .left-sidebar {
      width: 220px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      font-size: 12px;
      position: relative;
    }
    .left-sidebar::after {
      content: ''; position: absolute; right: 0; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--border-glow), transparent);
    }
    .sidebar-top { padding: 16px; border-bottom: 1px solid var(--border-color); }
    .sidebar-identity { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #0a0e17;
      box-shadow: var(--accent-glow);
    }
    .info .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .info .tagline { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .connection-status {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; font-size: 11px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
      position: relative;
    }
    .status-dot.online {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }
    .status-dot.warning { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .status-dot.offline { background: var(--danger); }
    .status-text { color: var(--text-secondary); }
    .queue-badge {
      background: var(--accent); color: #0a0e17; padding: 0 5px;
      border-radius: 8px; font-size: 10px; font-weight: 600;
    }

    .sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; margin-bottom: 2px; position: relative;
    }
    .nav-item:hover { background: var(--hover-bg); }
    .nav-item.active {
      background: var(--accent-dim); color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .nav-icon { font-size: 14px; }
    .nav-label { font-size: 12px; }

    .sidebar-log {
      height: 160px; border-top: 1px solid var(--border-color);
      display: flex; flex-direction: column;
      background: rgba(0,0,0,0.15);
      font-family: 'Cascadia Code', 'JetBrains Mono', 'SF Mono', monospace;
    }
    .log-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; font-size: 11px; color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .log-body {
      flex: 1; overflow-y: auto; padding: 4px 8px; font-size: 11px;
    }
    .log-entry { padding: 2px 0; font-variant-numeric: tabular-nums; }
    .log-time { color: var(--text-muted); margin-right: 4px; }
    .log-info { color: var(--text-secondary); }
    .log-ok { color: var(--success); }
    .log-warn { color: var(--warning); }
    .log-err { color: var(--danger); }

    /* ── Main Area ── */
    .main-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
      background: var(--bg-primary);
    }
    .status-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; border-bottom: 1px solid var(--border-color);
      background: var(--glass-bg); font-size: 11px;
      backdrop-filter: blur(8px);
    }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .spacer { flex: 1; }
    .warning-tag { color: var(--text-muted); }

    .messages {
      flex: 1; padding: 16px 20px; overflow-y: auto;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    .message { margin-bottom: 16px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .message-header strong { font-size: 12px; font-weight: 600; }
    .message-user .message-header strong { color: var(--success); }
    .message-assistant .message-header strong { color: var(--accent); }
    .message-time { font-size: 10px; color: var(--text-muted); }

    /* 角色对称：用户消息在右侧（右间距），助手消息在左侧（左间距） */
    .message-user {
      text-align: right;
    }
    .message-user .message-header {
      flex-direction: row-reverse;
    }
    .message-user .message-content {
      text-align: left;
      border-color: var(--success);
      border-left: 3px solid var(--success);
      max-width: 83%;
      margin-left: auto;
    }
    .message-assistant {
      text-align: left;
    }
    .message-assistant .message-header {
      flex-direction: row;
    }
    .message-assistant .message-content {
      border-color: var(--accent);
      border-right: 3px solid var(--accent);
      max-width: 83%;
      margin-right: auto;
    }

    .message-content {
      padding: 8px 12px; border-radius: 8px;
      background: var(--glass-bg); font-size: 13px; line-height: 1.6; overflow-x: auto;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(4px);
    }
    .msg-meta { margin-top: 4px; font-size: 11px; color: var(--text-muted); padding: 4px 12px; }
    .msg-copy-row { margin-top: 4px; padding: 0 12px; }
    .msg-copy-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 10px; font-family: inherit;
    }
    .msg-copy-btn:hover { color: var(--accent); }
    .msg-copy-btn.copied { color: var(--success); }

    /* ── Markdown ── */
    .markdown-body p { margin-bottom: 8px; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body strong { color: var(--text-primary); }
    .markdown-body code {
      background: var(--accent-dim); padding: 2px 6px; border-radius: 4px;
      font-size: 12px; color: var(--accent);
    }
    .markdown-body pre {
      background: #0d1117; border: 1px solid var(--border-color); border-radius: 8px;
      padding: 12px; margin: 8px 0; overflow-x: auto;
    }
    .markdown-body pre code {
      background: none; padding: 0; color: var(--text-primary); font-size: 12px; line-height: 1.5;
    }
    .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      margin: 12px 0 6px; color: var(--text-primary);
    }
    .markdown-body h2 { font-size: 16px; }
    .markdown-body h3 { font-size: 14px; }
    .markdown-body h4 { font-size: 13px; }
    .markdown-body ul { margin: 4px 0 4px 20px; }
    .markdown-body li { margin-bottom: 2px; }
    .markdown-body br { display: none; }
    .markdown-body blockquote {
      border-left: 3px solid var(--border-color); padding-left: 12px; color: var(--text-secondary); margin: 8px 0;
    }

    /* ── Input Area ── */
    .input-area {
      padding: 12px 20px; border-top: 1px solid var(--border-color);
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
    }
    .input-row { display: flex; gap: 8px; }
    .input-row textarea {
      flex: 1; padding: 8px 14px; border: 1px solid var(--border-color); border-radius: 8px;
      background: var(--input-bg); color: var(--text-primary); font-size: 13px; font-family: inherit;
      outline: none; resize: none; min-height: 36px; max-height: 200px;
      line-height: 1.5; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--border-glow);
    }
    .input-row textarea::placeholder { color: var(--text-muted); }
    .input-row textarea:disabled { opacity: 0.5; }
    .input-row button {
      padding: 8px 20px; border: 1px solid var(--accent); border-radius: 8px;
      background: var(--accent-dim); color: var(--accent); cursor: pointer; font-size: 13px;
      font-family: inherit; font-weight: 500; transition: all 0.2s;
      align-self: flex-end;
    }
    .input-row button:hover {
      background: var(--accent); color: #0a0e17;
      box-shadow: var(--accent-glow);
    }
    .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop {
      background: rgba(255, 77, 96, 0.15) !important;
      border-color: var(--danger) !important;
      color: var(--danger) !important;
    }
    .btn-stop:hover {
      background: var(--danger) !important;
      color: #fff !important;
      box-shadow: 0 0 12px rgba(255, 77, 96, 0.3) !important;
    }

    /* ── Side Panel ── */
    .side-panel {
      width: 280px; background: var(--sidebar-bg);
      border-left: 1px solid var(--border-color);
      padding: 12px; overflow-y: auto; font-size: 12px;
      position: relative;
    }
    .side-panel::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--border-glow), transparent);
    }
    .side-panel::-webkit-scrollbar { width: 4px; }
    .side-panel::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

    .panel-section {
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    .panel-section:last-child { border-bottom: none; }
    .panel-collapse-header {
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    .panel-collapse-header h3 {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .panel-collapse-header .arrow {
      font-size: 8px; color: var(--text-muted); transition: transform 0.2s;
    }
    .panel-collapse-header .arrow.open { transform: rotate(90deg); }
    .panel-collapse-body {
      overflow: hidden; transition: max-height 0.2s ease, opacity 0.2s ease;
    }
    .panel-body-inner { padding-top: 8px; }

    .score-large { text-align: center; padding: 8px 0; }
    .score-number { font-size: 36px; font-weight: 700; }
    .empty-state { color: var(--text-muted); font-size: 11px; }

    .mem-item {
      display: flex; justify-content: space-between; padding: 3px 0;
      font-size: 11px; border-bottom: 1px solid var(--border-color);
    }
    .mem-item:last-child { border-bottom: none; }
    .mem-key { color: var(--accent); }
    .mem-val { color: var(--text-muted); }

    .issue { padding: 2px 6px; margin-bottom: 2px; border-radius: 4px; font-size: 11px; }
    .issue.error { background: rgba(255, 77, 96, 0.1); color: var(--danger); }
    .issue.warning { background: rgba(255, 193, 7, 0.1); color: var(--warning); }
    .issue.info { background: var(--accent-dim); color: var(--accent); }

    .evo-item { padding: 2px 0; font-size: 11px; color: var(--text-muted); }

    .setting-row {
      display: flex; justify-content: space-between; align-items: center; padding: 4px 0;
    }
    .setting-row label { font-size: 11px; color: var(--text-muted); }
    .setting-row select {
      background: var(--input-bg); color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px; padding: 2px 6px; font-size: 11px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .setting-row select:focus { border-color: var(--accent); }

    .guard-chip {
      display: inline-block; background: var(--accent-dim); color: var(--accent);
      padding: 2px 8px; border-radius: 10px; font-size: 10px; margin: 2px;
      border: 1px solid var(--border-glow);
    }

    .thinking-dots span {
      animation: blink 1.4s infinite; font-size: 24px; color: var(--accent);
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    /* ── Plugin Market ── */
    .plugin-market {
      flex: 1; display: flex; flex-direction: column;
      padding: 20px; overflow-y: auto; min-width: 0;
    }
    .plugin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .plugin-header h2 { font-size: 18px; color: var(--text-primary); margin: 0; }
    .plugin-search { margin-bottom: 16px; }
    .search-input {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px;
      background: var(--input-bg); color: var(--text-primary); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--border-glow);
    }
    .plugin-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .plugin-card {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 8px;
      padding: 12px 16px; transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    .plugin-card:hover { border-color: var(--border-glow); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .plugin-card.disabled { opacity: 0.6; }
    .plugin-info { flex: 1; min-width: 0; }
    .plugin-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .plugin-name { font-size: 14px; color: var(--text-primary); }
    .plugin-version { font-size: 11px; color: var(--text-muted); }
    .plugin-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
    }
    .badge-enabled { background: rgba(0, 230, 118, 0.1); color: var(--success); }
    .badge-disabled { background: rgba(255, 77, 96, 0.1); color: var(--danger); }
    .plugin-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .plugin-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 12px; }
    .plugin-actions { display: flex; gap: 6px; margin-left: 12px; }

    /* ── Buttons ── */
    .btn {
      padding: 6px 14px; border: 1px solid var(--border-color); border-radius: 6px;
      background: var(--bg-tertiary); color: var(--text-primary); cursor: pointer; font-size: 12px;
      font-family: inherit; transition: all 0.15s;
    }
    .btn:hover { background: var(--hover-bg); border-color: var(--accent); }
    .btn-primary {
      background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent); color: #0a0e17; box-shadow: var(--accent-glow); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-success { background: rgba(0, 230, 118, 0.1); border-color: var(--success); color: var(--success); }
    .btn-success:hover { background: rgba(0, 230, 118, 0.2); }
    .btn-warning { background: rgba(255, 193, 7, 0.1); border-color: var(--warning); color: var(--warning); }
    .btn-warning:hover { background: rgba(255, 193, 7, 0.2); }
    .btn-danger { background: rgba(255, 77, 96, 0.1); border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(255, 77, 96, 0.2); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* ── Sub-tabs (任务页子标签) ── */
    .sub-tab {
      padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
      color: var(--text-muted); transition: all 0.15s;
    }
    .sub-tab:hover { color: var(--text-primary); background: var(--hover-bg); }
    .sub-tab.active {
      color: var(--accent); background: var(--accent-dim);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.65);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px;
      width: 480px; max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border-color);
    }
    .modal-header h3 { margin: 0; font-size: 16px; color: var(--text-primary); }
    .modal-close {
      background: none; border: none; color: var(--text-secondary); font-size: 20px;
      cursor: pointer; padding: 0 4px;
    }
    .modal-close:hover { color: var(--danger); }
    .modal-body { padding: 20px; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 12px 20px; border-top: 1px solid var(--border-color);
    }
    .install-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .install-tabs .tab {
      flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 6px;
      background: var(--input-bg); color: var(--text-muted); cursor: pointer; font-size: 12px;
      font-family: inherit; text-align: center;
    }
    .install-tabs .tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .install-input label {
      display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
    }
    .install-input input {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px;
      background: var(--input-bg); color: var(--text-primary); font-size: 13px; font-family: inherit;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .install-input input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--border-glow);
    }

    /* ── Review + Evolution 双栏仪表盘 ── */
    .evolution-dashboard {
      flex: 1; display: flex; flex-direction: column; gap: 16px;
      padding: 20px; overflow-y: auto; min-width: 0;
    }
    .evolution-dashboard::-webkit-scrollbar { width: 6px; }
    .evolution-dashboard::-webkit-scrollbar-track { background: transparent; }
    .evolution-dashboard::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ── 公共面板骨架 ── */
    .review-panel,
    .evolution-panel {
      background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 12px;
      padding: 20px; backdrop-filter: blur(4px);
      display: flex; flex-direction: column; gap: 16px;
    }
    .panel-title-bar {
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-title-bar h3 {
      font-size: 15px; color: var(--text-primary); margin: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-icon { font-size: 16px; }
    .panel-error {
      background: rgba(255, 77, 96, 0.1); border: 1px solid rgba(255, 77, 96, 0.3);
      border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--danger);
    }
    .panel-loading {
      text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 13px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border-color);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .review-panel:hover,
    .evolution-panel:hover {
      border-color: var(--border-glow);
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .panel-empty {
      text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 13px;
    }

    /* ── 审查评分面板 ── */
    .review-content { display: flex; flex-direction: column; gap: 16px; }

    .review-score-section {
      display: flex; align-items: center; gap: 24px;
    }
    .review-score-ring { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .review-score-circle {
      width: 96px; height: 96px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .review-score-inner {
      width: 76px; height: 76px; border-radius: 50%;
      background: var(--bg-primary);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .review-score-number { font-size: 28px; font-weight: 700; line-height: 1; }
    .review-score-label { font-size: 11px; color: var(--text-muted); }
    .review-score-text {
      font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
    }

    .review-progress-bar { flex: 1; min-width: 120px; }
    .progress-track {
      height: 8px; background: var(--bg-tertiary); border-radius: 4px;
      overflow: hidden; margin-bottom: 4px;
    }
    .progress-fill {
      height: 100%; border-radius: 4px; transition: width 0.5s ease;
    }
    .progress-labels {
      display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted);
    }

    .review-issues h4,
    .review-suggestions h4 {
      font-size: 12px; color: var(--text-muted); margin: 0 0 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .review-issue {
      padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
      border: 1px solid var(--border-color);
    }
    .review-issue-error { background: rgba(255, 77, 96, 0.05); border-left: 3px solid var(--danger); }
    .review-issue-warning { background: rgba(255, 193, 7, 0.05); border-left: 3px solid var(--warning); }
    .review-issue-info { background: rgba(0, 255, 224, 0.03); border-left: 3px solid var(--accent); }
    .review-issue-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .review-issue-severity {
      font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600;
    }
    .review-issue-type { font-size: 11px; color: var(--text-primary); font-weight: 500; }
    .review-issue-location { font-size: 10px; color: var(--text-muted); margin-left: auto; font-family: 'SF Mono', monospace; }
    .review-issue-message { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

    .suggestion-list {
      list-style: none; padding: 0; display: flex; flex-direction: column; gap: 6px;
    }
    .suggestion-item {
      padding: 8px 12px; background: var(--accent-dim); border-radius: 6px;
      font-size: 12px; color: var(--text-primary); border: 1px solid var(--border-glow);
      position: relative; padding-left: 24px;
    }
    .suggestion-item::before {
      content: '→'; position: absolute; left: 10px; color: var(--accent);
    }

    /* ── 进化汇总面板 ── */
    .evolution-content { display: flex; flex-direction: column; gap: 16px; }
    .evolution-stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .evolution-stat-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 12px;
    }
    .evolution-stat-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .evolution-stat-value {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
    }
    .evolution-stat-label {
      font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
    }

    .evolution-trend-section h4,
    .evolution-records h4 {
      font-size: 12px; color: var(--text-muted); margin: 0 0 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .trend-container { padding: 8px 0; }
    .trend-bars {
      display: flex; align-items: flex-end; gap: 6px; height: 48px;
    }
    .trend-bar {
      flex: 1; border-radius: 3px 3px 0 0; min-height: 4px;
      transition: height 0.3s ease;
    }
    .trend-labels {
      display: flex; gap: 6px; margin-top: 4px;
    }
    .trend-label {
      flex: 1; text-align: center; font-size: 9px; color: var(--text-muted);
    }

    .evolution-actions { display: flex; gap: 8px; }

    .records-table {
      border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;
    }
    .records-header {
      display: grid;
      grid-template-columns: 70px 1fr 1fr 50px 70px;
      gap: 8px; padding: 8px 12px;
      background: var(--bg-tertiary); font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .records-row {
      display: grid;
      grid-template-columns: 70px 1fr 1fr 50px 70px;
      gap: 8px; padding: 8px 12px;
      border-top: 1px solid var(--border-color);
      align-items: center;
    }
    .records-row:hover { background: var(--hover-bg); }
    .records-col-time { font-size: 11px; color: var(--text-muted); }
    .records-col-task { font-size: 11px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .records-col-improve { font-size: 11px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .records-col-score { font-size: 12px; font-weight: 600; text-align: center; }
    .records-col-status { text-align: center; }

    .adoption-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
    }
    .adoption-badge.adopted { background: rgba(0, 230, 118, 0.1); color: var(--success); }
    .adoption-badge.rejected { background: rgba(255, 77, 96, 0.1); color: var(--danger); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
